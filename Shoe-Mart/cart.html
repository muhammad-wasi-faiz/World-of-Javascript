<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart</title>
  <link rel="stylesheet" href="output.css">
  <link rel="icon" type="image/png" href="./assets/logoo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-sans text-[#353535] mx-10">

  <header class="mx-10">
    <nav class="mb-2 p-3">
      <div id="home">
        <a class="flex justify-center" href="index.html">
          <img class="w-[100px] p-2" src="./assets/logoo.jpg" alt="logo">
        </a>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center justify-center gap-2">
          <a href="#"><span class="lg:hidden hover:text-pink-500"><i class="fa-solid fa-list"></i></span></a>
          <a href="#"><span class="hover:text-pink-500"><i class="fa-solid fa-user"></i></span></a>
          <a href="#"><span class="hover:text-pink-500"><i class="fa-solid fa-magnifying-glass"></i></span></a>
        </div>

        <div class="lg:flex lg:gap-[15px] xl:gap-[25px] hidden">
          <a class="animate-pulse text-pink-500 font-extrabold relative inline-block pb-1 hover:after:w-full" href="newarrivals.html">New Arrivals</a>
          <a class="relative inline-block pb-1 hover:after:w-full" href="index.html">Home</a>
          <a class="relative inline-block pb-1 hover:after:w-full" href="bags.html">Bags</a>
          <a class="relative inline-block pb-1 hover:after:w-full" href="cart.html">My Cart</a>
          <a class="relative inline-block pb-1 hover:after:w-full" href="checkout.html">Checkout</a>
        </div>

        <div class="flex gap-[10px] items-center">
          <a href="login.html">
            <input class="hover:cursor-pointer border-[1.5px] hover:bg-pink-500 hover:border-[2px] hover:text-white hover:font-bold border-black text-black py-2 px-4" type="submit" value="Sign-in">
          </a>
          <a href="signup.html">
            <input class="hover:cursor-pointer border-[1.5px] hover:border-[2px] hover:font-bold border-black text-white bg-pink-500 py-2 px-4" type="submit" value="Sign-up">
          </a>
        </div>
      </div>
    </nav>
  </header>

  <hr>

  <main class="mx-10" id="cart-root">
    <div class="py-10 text-center text-gray-600">Loading cart...</div>
  </main>

  <footer>
    <div class="flex flex-col items-center justify-center mb-3">
      <p class="font-extralight">2025 Shoe Mart | All Rights Reserved</p>
    </div>
  </footer>

  <script type="module" src="./app.js"></script>
  <script src="https://kit.fontawesome.com/501c54cdfe.js" crossorigin="anonymous"></script>
</body>
</html>
