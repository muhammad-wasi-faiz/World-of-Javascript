<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Weather</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="flex justify-center w-full bg-[#4b756b]"> 

    <div id="card" >
        

    </div>

    <template id="temp">
        <div class="flex mt-4 gap-2 text-[#1d5648] items-center w-[650px] h-[450px] border-2 border-black rounded-2xl justify-around bg-[#b7debf]">

            <div class="flex flex-col items-center gap-4">
  
            <span class="text-center mt-3 ">
                <h1 class="font-bold text-4xl ">JS Weather</h1>
                <h2 class="text-sm mt-1">Track Real-Time Weather Forcast, AnyTime Anywhere</h2>
            </span>

            <span>
                <input id="inp" class="border-2 p-2 border-black rounded-4xl bg-white" type="text" placeholder="  e.g Lahore">
                <button id="btn" class=" bg-[#173e34] text-white px-3 py-2 rounded-xl hover:cursor-pointer">Search</button>
            </span>

        <div class="flex items-center">

            <div class="flex items-end gap-20">

            <div class="flex flex-col gap-2 items-center">

            <img id="icon" class="w-[120px]" src=".\assets\logo.png" alt="weather logo">
            <h2 id="temprature" class="font-bold text-5xl">24C</h2>
            <h3 id="location" class="font-bold text-2xl">Lahore, Pakistan</h3>

            </div>


            
            <div class="flex flex-col gap-14 w-full items-center">
                <span class=" items-center">
                    <p id="weather" class="text-5xl font-bold">Weather type</p>
                </span>
                <div class="flex gap-14 w-full">
                    <span class="flex flex-col items-center">
                        <p id="humidity" class="text-lg font-bold">28%</p>
                        <p class="font-bold">Humidity</p>
                    </span>
                    
                    <span class="flex flex-col items-center">
                        <p id="wind" class="text-lg font-bold">18kmph</p>
                        <p class="font-semibold">Wind Speed</p>
                    </span>
                    
                     </div>
            </div>
            
            </div>
        </div>

         </div>

        </div>
    </template>   
    
    <script src="script.js"></script>
</body>
</html>
