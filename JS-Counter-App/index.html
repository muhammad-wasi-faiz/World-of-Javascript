<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="output.css">
  
</head>
<body class="bg-amber-200 text-black flex justify-center items-center h-screen">

    <div class="flex flex-col items-center">
        <div class="flex flex-col justify-center items-center gap-4">
    
            <h1 class="text-5xl font-bold">Count With JavaScript</h1>
            <input class="border-2 border-w rounded-lg px-2" type="text" id="num" readonly value="0">

            <div class="flex flex-col justify-center items-center mt-3 gap-3">

                <div>
                    <button id="plus" class=" text-5xl font-bold bg-black text-white rounded-lg px-6 py-1" type="button">+</button>
                    <button id="minus" class=" text-5xl font-bold bg-black text-white rounded-lg px-8 " type="button">-</button>
                </div>

                    <button id="reset" class="text-3xl font-bold bg-black text-white rounded-lg px-3 py-2" type="reset">Reset</button>
            </div>
            
       
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
